    <title>CVGenius - AI Resume Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .resume-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.15); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
        
        /* Container que força o CV de 800px a caber na tela do celular */
        .cv-viewport {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        
        .cv-scaler {
            transform-origin: top center;
            width: 800px;
            flex-shrink: 0;
            /* Default scale for desktop to fit within the container */
            transform: scale(0.6);
        }

        .cv-scaler-large {
            transform-origin: top center;
            width: 800px;
            flex-shrink: 0;
            /* Larger scale for desktop in step 4 */
            transform: scale(0.8);
        }

        @media (min-width: 1024px) {
            .cv-viewport {
                height: calc(1131px * 0.6); /* 800 * 1.414 (A4 ratio) * 0.6 */
            }
            .cv-viewport-large {
                height: calc(1131px * 0.8); /* 800 * 1.414 (A4 ratio) * 0.8 */
            }
        }

        @media (max-width: 1023px) {
            .cv-scaler, .cv-scaler-large {
                /* Calcula a escala baseada na largura da tela (com margem de 64px para não colar nas bordas) */
                transform: scale(calc((100vw - 64px) / 800));
            }
            .cv-viewport, .cv-viewport-large {
                /* Ajusta a altura do container pai para não sobrar buraco branco embaixo devido ao transform */
                height: calc(1131px * ((100vw - 64px) / 800));
            }
        }
    </style>
